<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link in Bio - All My Payment Links</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0f; color: #e4e4e7; min-height: 100vh; padding: 2rem; }
    .container { max-width: 480px; margin: 0 auto; text-align: center; }
    .avatar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #818cf8); margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .bio { color: #a1a1aa; margin-bottom: 2rem; }
    .links { display: flex; flex-direction: column; gap: 1rem; }
    .link { display: block; padding: 1rem 1.5rem; background: #12121a; border: 1px solid #2a2a3a; border-radius: 12px; text-decoration: none; color: #e4e4e7; transition: all 0.2s; }
    .link:hover { border-color: #6366f1; transform: translateY(-2px); }
    .link-payment { background: #22c55e; border-color: #22c55f; }
    .link-payment:hover { background: #16a34a; }
    .link-icon { margin-right: 0.5rem; }
    .socials { display: flex; justify-content: center; gap: 1rem; margin-top: 2rem; }
    .social { width: 40px; height: 40px; border-radius: 50%; background: #12121a; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.25rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">💰</div>
    <h1>My Payment Links</h1>
    <p class="bio">Pay me instantly for services, products, or consulting.</p>
    
    <div class="links">
      <a href="#" class="link link-payment" onclick="copyVenmo()">
        <span class="link-icon">💸</span> Venmo
      </a>
      <a href="#" class="link link-payment" onclick="copyPaypal()">
        <span class="link-icon">🅿️</span> PayPal
      </a>
      <a href="/invoice-generator" class="link">
        <span class="link-icon">📄</span> Get an Invoice
      </a>
      <a href="/calculator" class="link">
        <span class="link-icon">📊</span> Free Profit Calculator
      </a>
      <a href="/app" class="link">
        <span class="link-icon">💳</span> Client Portal
      </a>
    </div>

    <div class="socials">
      <a href="#" class="social">𝕏</a>
      <a href="#" class="social">📸</a>
      <a href="#" class="social">📘</a>
    </div>
  </div>

  <script>
    function copyVenmo() {
      navigator.clipboard.writeText('your-venmo-username');
      alert('Venmo username copied! Paste in Venmo to pay me.');
    }
    function copyPaypal() {
      navigator.clipboard.writeText('your-paypal-email');
      alert('PayPal email copied! Send payment to paypal.me/yourname');
    }
  </script>
</body>
</html>
