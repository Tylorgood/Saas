<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay Invoice - CashFlow AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0f; color: #e4e4e7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #12121a; border: 1px solid #2a2a3a; border-radius: 16px; padding: 2.5rem; max-width: 450px; width: 100%; }
    .logo { font-size: 1.5rem; font-weight: 700; margin-bottom: 2rem; }
    .logo span { color: #6366f1; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    .invoice-info { background: #1a1a25; padding: 1.5rem; border-radius: 8px; margin: 1.5rem 0; }
    .row { display: flex; justify-content: space-between; margin-bottom: 0.75rem; }
    .row:last-child { margin-bottom: 0; font-weight: 600; font-size: 1.25rem; }
    .label { color: #a1a1aa; }
    .amount { color: #22c55e; }
    .btn { display: block; width: 100%; padding: 1rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #818cf8; }
    .btn-secondary { background: transparent; border: 1px solid #2a2a3a; color: #e4e4e7; margin-top: 1rem; }
    .success { text-align: center; }
    .success-icon { font-size: 4rem; margin-bottom: 1rem; }
    .success h2 { color: #22c55e; margin-bottom: 0.5rem; }
    .error { text-align: center; color: #f85149; }
    .error h2 { color: #f85149; margin-bottom: 0.5rem; }
    .hidden { display: none; }
    .loading { text-align: center; padding: 2rem; }
    .spinner { border: 3px solid #2a2a3a; border-top: 3px solid #6366f1; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">CashFlow <span>AI</span></div>
    
    <div id="loadingView">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading invoice...</p>
      </div>
    </div>
    
    <div id="invoiceView" class="hidden">
      <h1>Invoice Payment</h1>
      <div class="invoice-info">
        <div class="row">
          <span class="label">Invoice #</span>
          <span id="invoiceNumber">-</span>
        </div>
        <div class="row">
          <span class="label">From</span>
          <span id="fromName">-</span>
        </div>
        <div class="row">
          <span class="label">Due Date</span>
          <span id="dueDate">-</span>
        </div>
        <div class="row">
          <span class="label">Amount</span>
          <span class="amount" id="amount">$0.00</span>
        </div>
      </div>
      <button class="btn btn-primary" onclick="payWithStripe()">Pay with Card</button>
    </div>
    
    <div id="successView" class="success hidden">
      <div class="success-icon">✓</div>
      <h2>Payment Successful!</h2>
      <p style="color: #a1a1aa; margin-top: 0.5rem;">Thank you for your payment.</p>
      <p style="color: #a1a1aa; font-size: 0.875rem; margin-top: 1rem;">Redirecting to app...</p>
    </div>
    
    <div id="canceledView" class="error hidden">
      <h2>Payment Canceled</h2>
      <p style="color: #a1a1aa; margin-top: 0.5rem;">You can try again anytime.</p>
      <button class="btn btn-secondary" onclick="location.reload()">Try Again</button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    let invoiceId = params.get('id') || params.get('d');
    let invoiceData = null;
    
    if (params.get('success') === 'true') {
      document.getElementById('loadingView').classList.add('hidden');
      document.getElementById('successView').classList.remove('hidden');
      if (invoiceId) {
        fetch(`/api/invoice/${invoiceId}/mark-paid`, { method: 'POST' }).then(() => {
          setTimeout(() => window.location.href = '/app', 3000);
        });
      }
    } else if (params.get('canceled') === 'true') {
      document.getElementById('loadingView').classList.add('hidden');
      document.getElementById('canceledView').classList.remove('hidden');
    } else if (invoiceId) {
      try {
        invoiceData = JSON.parse(atob(invoiceId));
        document.getElementById('invoiceNumber').textContent = invoiceData.inv || 'INV-0001';
        document.getElementById('fromName').textContent = invoiceData.from || 'Business';
        document.getElementById('dueDate').textContent = invoiceData.due || 'N/A';
        document.getElementById('amount').textContent = '$' + parseFloat(invoiceData.amt || 0).toFixed(2);
        document.getElementById('loadingView').classList.add('hidden');
        document.getElementById('invoiceView').classList.remove('hidden');
      } catch(e) {
        document.getElementById('loadingView').classList.add('hidden');
        document.getElementById('invoiceView').classList.remove('hidden');
      }
    } else {
      document.getElementById('loadingView').classList.add('hidden');
      document.getElementById('invoiceView').classList.remove('hidden');
    }
    
    async function payWithStripe() {
      try {
        const res = await fetch('/api/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ invoiceId: invoiceData?.id })
        });
        
        const data = await res.json();
        
        if (data.url) {
          window.location.href = data.url;
        } else {
          alert(data.error || 'Payment failed');
        }
      } catch(err) {
        alert('Payment error');
      }
    }
  </script>
</body>
</html>
