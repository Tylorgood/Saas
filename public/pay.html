<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pay Now - Instant Secure Payment</title>
  <meta name="robots" content="noindex">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg, #0a0a0f 0%, #1a1a25 100%); color: #e4e4e7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #12121a; border: 1px solid #2a2a3a; border-radius: 20px; padding: 3rem; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
    .success { display: none; }
    .success.show { display: block; }
    .form { display: block; }
    .form.hide { display: none; }
    .logo { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .logo span { color: #22c55e; }
    h1 { font-size: 1.75rem; margin-bottom: 0.5rem; }
    .subtitle { color: #a1a1aa; margin-bottom: 2rem; }
    .amount-display { background: #1a1a25; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .amount-label { font-size: 0.875rem; color: #a1a1aa; margin-bottom: 0.5rem; }
    .amount-value { font-size: 3rem; font-weight: 700; color: #22c55e; }
    .btn { display: block; width: 100%; padding: 1.25rem; border-radius: 12px; font-size: 1.2rem; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; box-shadow: 0 10px 20px rgba(34,197,94,0.3); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(34,197,94,0.4); }
    .secure { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; font-size: 0.8rem; color: #a1a1aa; }
    .success-icon { font-size: 5rem; margin-bottom: 1rem; }
    .success h2 { color: #22c55e; margin-bottom: 1rem; }
    .success p { color: #a1a1aa; }
    .branding { margin-top: 2rem; font-size: 0.875rem; color: #a1a1aa; }
    .branding a { color: #6366f1; }
  </style>
</head>
<body>
  <div class="card">
    <div class="form" id="paymentForm">
      <div class="logo">Money<span>X</span></div>
      <h1>Secure Payment</h1>
      <p class="subtitle">Fast, secure checkout</p>
      
      <div class="amount-display">
        <div class="amount-label">Amount</div>
        <div class="amount-value" id="displayAmount">$25</div>
      </div>
      
      <button class="btn btn-primary" onclick="processPayment()">
        💳 Pay Now
      </button>
      
      <div class="secure">
        <span>🔒 Secured by Stripe</span>
      </div>
      
      <div class="branding">
        <a href="https://cashflow-ai-40om.onrender.com/">Powered by MoneyX</a>
      </div>
    </div>
    
    <div class="success" id="successView">
      <div class="success-icon">✅</div>
      <h2>Payment Successful!</h2>
      <p>Thank you for your payment.</p>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const amount = params.get('amount') || '25';
    document.getElementById('displayAmount').textContent = '$' + amount;
    
    if (params.get('success') === 'true') {
      document.getElementById('paymentForm').classList.add('hide');
      document.getElementById('successView').classList.add('show');
    }
    
    async function processPayment() {
      const amt = params.get('amount') || '25';
      
      try {
        const res = await fetch('/api/quick-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount: amt, description: 'Quick Payment' })
        });
        
        const data = await res.json();
        
        if (data.url) {
          window.location.href = data.url;
        } else {
          alert('Error: ' + (data.error || 'Payment failed'));
        }
      } catch(err) {
        alert('Payment error: ' + err.message);
      }
    }
  </script>
</body>
</html>
