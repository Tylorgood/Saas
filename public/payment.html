<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Payment - Send Money Instantly</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0a0a0f; color: #e4e4e7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #12121a; border: 1px solid #2a2a3a; border-radius: 16px; padding: 2.5rem; max-width: 420px; width: 100%; text-align: center; }
    .logo { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    .logo span { color: #6366f1; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .subtitle { color: #a1a1aa; margin-bottom: 2rem; font-size: 0.9rem; }
    .form-group { margin-bottom: 1rem; text-align: left; }
    label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: #a1a1aa; }
    input { width: 100%; padding: 1rem; border: 1px solid #2a2a3a; border-radius: 8px; background: #1a1a25; color: #fff; font-size: 1.1rem; text-align: center; }
    input:focus { outline: none; border-color: #6366f1; }
    .btn { display: block; width: 100%; padding: 1rem; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; border: none; margin-top: 1.5rem; transition: all 0.2s; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #818cf8; }
    .btn-paypal { background: #003087; color: #fff; margin-top: 0.75rem; }
    .btn-venmo { background: #3d95ce; color: #fff; margin-top: 0.75rem; }
    .secure { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 1.5rem; font-size: 0.8rem; color: #a1a1aa; }
    .divider { display: flex; align-items: center; margin: 1.5rem 0; color: #a1a1aa; font-size: 0.875rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #2a2a3a; }
    .divider span { padding: 0 1rem; }
    .note { background: #1a1a25; padding: 1rem; border-radius: 8px; font-size: 0.8rem; color: #a1a1aa; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Money<span>X</span></div>
    <h1>Quick Payment</h1>
    <p class="subtitle">Send payment instantly</p>
    
    <div class="form-group">
      <label>Amount ($)</label>
      <input type="number" id="amount" placeholder="50.00" value="25.00">
    </div>
    
    <div class="form-group">
      <label>What is this for?</label>
      <input type="text" id="description" placeholder="Services, consulting, product...">
    </div>
    
    <button class="btn btn-primary" onclick="payWithCard()">💳 Pay with Card</button>
    
    <div class="divider"><span>or use</span></div>
    
    <button class="btn btn-paypal" onclick="copyPaypal()">♻️ Copy PayPal</button>
    <button class="btn btn-venmo" onclick="copyVenmo()">💸 Copy Venmo</button>
    
    <div class="secure">
      <span>🔒 Secure payment powered by Stripe</span>
    </div>
    
    <div class="note">
      Business owner? <a href="/app" style="color: #6366f1;">Get paid automatically →</a>
    </div>
  </div>

  <script>
    async function payWithCard() {
      const amount = document.getElementById('amount').value;
      const desc = document.getElementById('description').value || 'Payment';
      
      if (!amount || amount <= 0) {
        alert('Please enter an amount');
        return;
      }
      
      try {
        const res = await fetch('/api/quick-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ amount: parseFloat(amount), description: desc })
        });
        
        const data = await res.json();
        
        if (data.url) {
          window.location.href = data.url;
        } else {
          alert('Error: ' + (data.error || 'Payment failed'));
        }
      } catch(err) {
        alert('Payment error: ' + err.message);
      }
    }
    
    function copyPaypal() {
      alert('PayPal: paypal.me/yourname\n\nReplace with your PayPal username in the app settings.');
    }
    
    function copyVenmo() {
      alert('Venmo: @your-username\n\nReplace with your Venmo username in the app settings.');
    }
  </script>
</body>
</html>
